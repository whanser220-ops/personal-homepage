server {
    listen 80;
    server_name warmhanser.com www.warmhanser.com 1.117.232.198;

    charset utf-8;

    root /var/www/personal-homepage;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain application/xml;

    location = /bundle-report/ {
        return 308 /bundle-report;
    }

    location /_next/static/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location /bundle-report-data/ {
        access_log off;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
